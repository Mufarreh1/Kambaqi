<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>كم باقي؟ | العد التنازلي للمناسبات</title>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@300;400;600;700;900&family=Readex+Pro:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>

/* ===== FIXED ROOT ===== */
:root, [data-theme="obsidian"] {
--bg-primary:#08080f;
--bg-card:#101018;
--bg-card-hover:#18182a;
--gold:#c9a84c;
--gold-light:#e8cc6e;
--gold-dim:#8a6e28;
--text-primary:#eae6de;
--text-secondary:#8a8898;
--accent-green:#3edba5;
--accent-rose:#ff6b9d;
--accent-blue:#7c6ef0;
--accent-orange:#f0a030;
--radius:22px;
--font-main:'Noto Sans Arabic','Readex Pro',sans-serif;
}

/* ===== BODY ===== */
body{
margin:0;
font-family:var(--font-main);
background:var(--bg-primary);
color:var(--text-primary);
}

/* ===== HEADER ===== */
.header{
text-align:center;
padding:40px 20px;
}

.header h1{
font-size:32px;
background:linear-gradient(135deg,var(--gold-light),var(--gold));
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* ===== GRID ===== */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:20px;
padding:20px;
max-width:1200px;
margin:auto;
}

/* ===== CARD ===== */
.card{
background:var(--bg-card);
padding:20px;
border-radius:var(--radius);
transition:0.3s;
}

.card:hover{
background:var(--bg-card-hover);
transform:translateY(-5px);
}

.card-title{
font-size:18px;
margin-bottom:10px;
}

.countdown{
font-size:20px;
color:var(--gold);
}

/* ===== BUTTON ===== */
button{
padding:10px;
border:none;
border-radius:10px;
cursor:pointer;
background:var(--gold);
color:#000;
}

/* ===== FIX content ===== */
body::before{content:'';}

</style>
</head>

<body>

<header class="header">
<h1>كم باقي؟ ⏳</h1>
<p>العد التنازلي المباشر</p>
</header>

<main class="grid" id="grid"></main>

<script>

/* ===== EVENTS ===== */
const events = [
{title:"رمضان",date:"2027-02-08"},
{title:"عيد الفطر",date:"2026-03-20"},
{title:"عيد الأضحى",date:"2026-05-27"},
{title:"الراتب",date:"2026-05-27"}
];

/* ===== TIME ===== */
function getDiff(date){
const now=new Date();
const target=new Date(date);
const diff=target-now;

if(diff<=0) return "انتهى";

const d=Math.floor(diff/86400000);
const h=Math.floor((diff/3600000)%24);
const m=Math.floor((diff/60000)%60);

return d+" يوم "+h+" ساعة "+m+" دقيقة";
}

/* ===== RENDER ===== */
function render(){
const grid=document.getElementById("grid");
grid.innerHTML="";

events.forEach(e=>{
grid.innerHTML+=`
<div class="card">
<div class="card-title">${e.title}</div>
<div class="countdown">${getDiff(e.date)}</div>
</div>
`;
});
}

setInterval(render,1000);
render();

</script>

</body>
</html>
